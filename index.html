<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Vancouver Harbour Anchorages</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="map"></div>

<div id="top-bar">
  <div id="app-title">Vancouver Harbour Anchorages</div>
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Search points…" autocomplete="off" />
    <div id="search-results" class="hidden"></div>
  </div>
  <div id="top-actions">
    <button id="locate-btn" class="icon-btn" title="Locate me">📍</button>
    <button id="mode-toggle" class="btn">Edit Mode</button>
  </div>
</div>

<div id="edit-toolbar" class="hidden">
  <button id="draw-anchorage-btn" class="btn category-anchorage">+ Anchorage</button>
  <button id="draw-pickup-btn" class="btn category-pickup">+ Pick-up / Drop-off</button>
  <div id="edit-hint">Click the map to place a circle</div>
</div>

<div id="location-msg" class="toast hidden"></div>

<!-- Marker label / category form -->
<div id="marker-form-overlay" class="overlay hidden">
  <div class="modal">
    <h3 id="marker-form-title">New Marker</h3>
    <label for="marker-label-input">Label</label>
    <input type="text" id="marker-label-input" maxlength="60" placeholder="e.g. Coal Harbour Anchorage" />

    <label for="marker-coords-input">Coordinates (lat, lng)</label>
    <input type="text" id="marker-coords-input" placeholder="49.2900, -123.1300" />

    <div class="category-select">
      <label class="category-option">
        <input type="radio" name="category" value="anchorage" checked />
        <span class="swatch swatch-anchorage"></span> Anchorage
      </label>
      <label class="category-option">
        <input type="radio" name="category" value="pickupDropoff" />
        <span class="swatch swatch-pickup"></span> Pick-up / Drop-off
      </label>
    </div>

    <label for="marker-radius-input">Radius (meters)</label>
    <input type="range" id="marker-radius-input" min="10" max="2000" value="150" />
    <div id="marker-radius-value">150 m</div>

    <div class="modal-actions">
      <button id="marker-form-delete" class="btn btn-danger hidden">Delete</button>
      <div class="modal-actions-right">
        <button id="marker-form-cancel" class="btn btn-secondary">Cancel</button>
        <button id="marker-form-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="confirm-overlay" class="overlay hidden">
  <div class="modal">
    <h3>Delete this marker?</h3>
    <p id="confirm-text">This action cannot be undone.</p>
    <div class="modal-actions">
      <div class="modal-actions-right">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
