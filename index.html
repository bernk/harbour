<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Vancouver Harbour</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <meta name="mobile-web-app-capable" content="yes"> 
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png">
  <!-- <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)"> -->
  <!-- <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)"gs> -->
</head>
<body>

<div id="map"></div>

<div id="top-bar">
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Search…" autocomplete="off" />
    <div id="search-results" class="hidden"></div>
  </div>
</div>

<div id="corner-actions">
  <button id="mode-toggle" class="icon-btn" title="Settings" aria-label="Toggle Settings">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
  </button>
  <button id="log-position-btn" class="icon-btn" title="Log position" aria-label="Log current position">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 2C8.14 2 5 5.14 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.86-3.14-7-7-7zm4 8h-3v3h-2v-3H8V8h3V5h2v3h3v2z"/></svg>
  </button>
  <button id="log-note-btn" class="icon-btn" title="Add log entry" aria-label="Add manual log entry">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </button>
  <button id="view-log-btn" class="icon-btn" title="View position log" aria-label="View position log">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
  </button>
  <button id="locate-btn" class="icon-btn" title="Locate me" aria-label="Locate me">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
  </button>
</div>

<div id="edit-toolbar" class="hidden">
  <div id="basemap-picker" class="basemap-picker"></div>
  <button id="import-csv-btn" class="btn">Import Locations</button>
  <input type="file" id="import-csv-file" accept=".csv,text/csv" class="hidden" />
  <button id="export-csv-btn" class="btn">Export Locations</button>
  <button id="import-log-btn" class="btn">Import Log</button>
  <input type="file" id="import-log-file" accept=".csv,text/csv" class="hidden" />
  <button id="export-log-btn" class="btn">Export Log</button>
  <button id="delete-all-btn" class="btn btn-danger">Delete All</button>
  <label class="checkbox-option">
    <input type="checkbox" id="passenger-count-toggle" />
    Passenger count prompts
  </label>
  <label class="checkbox-option">
    <input type="checkbox" id="hide-brief-anchorage-toggle" />
    Hide brief anchorage visits (&lt;2 min)
  </label>
  <div id="edit-hint">Click the map to add a new location</div>
  <div id="version-label"></div>
</div>

<div id="location-msg" class="toast hidden"></div>

<!-- Marker label / category form -->
<div id="marker-form-overlay" class="overlay hidden">
  <div class="modal">
    <h3 id="marker-form-title">New Location</h3>
    <label for="marker-label-input">Label</label>
    <input type="text" id="marker-label-input" maxlength="60" placeholder="e.g. Coal Harbour Anchorage" />

    <label for="marker-coords-input">Coordinates (lat, lng)</label>
    <input type="text" id="marker-coords-input" placeholder="49.2900, -123.1300" />

    <div class="category-select">
      <label class="category-option">
        <input type="radio" name="category" value="pickupDropoff" checked />
        <span class="swatch swatch-pickup"></span> Transfer Point
      </label>
      <label class="category-option">
        <input type="radio" name="category" value="anchorage" />
        <span class="swatch swatch-anchorage"></span> Anchorage
      </label>
    </div>

    <label for="marker-radius-input">Radius (meters)</label>
    <input type="number" id="marker-radius-input" min="10" max="1000" step="1" value="25" />

    <div class="modal-actions">
      <button id="marker-form-delete" class="btn btn-danger hidden">Delete</button>
      <div class="modal-actions-right">
        <button id="marker-form-cancel" class="btn btn-secondary">Cancel</button>
        <button id="marker-form-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Manual log entry -->
<div id="log-note-overlay" class="overlay hidden">
  <div class="modal">
    <h3>Add Log Entry</h3>
    <label for="log-note-input">Note</label>
    <input type="text" id="log-note-input" maxlength="200" placeholder="e.g. Dropped off passengers" />
    <div class="modal-actions">
      <div class="modal-actions-right">
        <button id="log-note-cancel" class="btn btn-secondary">Cancel</button>
        <button id="log-note-save" class="btn btn-primary">Log</button>
      </div>
    </div>
  </div>
</div>

<!-- Passenger count prompt -->
<div id="passenger-count-overlay" class="overlay hidden">
  <div class="modal passenger-count-modal">
    <h3 id="passenger-count-title">Passengers</h3>
    <div id="passenger-count-grid" class="passenger-count-grid">
      <button class="passenger-count-btn" data-count="1">1</button>
      <button class="passenger-count-btn" data-count="2">2</button>
      <button class="passenger-count-btn" data-count="3">3</button>
      <button class="passenger-count-btn" data-count="4">4</button>
      <button class="passenger-count-btn" data-count="5">5</button>
      <button class="passenger-count-btn" data-count="6">6</button>
      <button class="passenger-count-btn" data-count="7">7</button>
      <button class="passenger-count-btn" data-count="8">8</button>
      <button class="passenger-count-btn" data-count="9">9</button>
      <button class="passenger-count-btn" data-count="10">10</button>
      <button class="passenger-count-btn" data-count="11">11</button>
      <button class="passenger-count-btn" data-count="12">12</button>
    </div>
    <div id="passenger-count-progress" class="passenger-count-progress">
      <div id="passenger-count-progress-bar" class="passenger-count-progress-bar"></div>
    </div>
    <div class="modal-actions">
      <div class="modal-actions-right">
        <button id="passenger-count-cancel" class="btn btn-secondary">Cancel</button>
        <button id="passenger-count-log" class="btn btn-primary">Log</button>
      </div>
    </div>
  </div>
</div>

<!-- Position log viewer -->
<div id="log-overlay" class="overlay hidden">
  <div class="modal log-modal">
    <h3>Position Log</h3>
    <div id="log-list"></div>
    <div class="modal-actions">
      <button id="log-clear" class="btn btn-danger">Clear Log</button>
      <div class="modal-actions-right">
        <button id="log-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="confirm-overlay" class="overlay hidden">
  <div class="modal">
    <h3 id="confirm-title">Delete this location?</h3>
    <p id="confirm-text">This action cannot be undone.</p>
    <div class="modal-actions">
      <div class="modal-actions-right">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="version.js"></script>
<script src="app.js"></script>
</body>
</html>
